# NTP Pipeline — Docker Compose
# 실행 순서: baseline → merge → critic → taw/random/shuffled → evaluate
# 모든 서비스는 4-GPU FSDP 분산학습 사용 (evaluate 제외)

services:
  # ── Phase 1: Baseline SFT (uniform weights) ──────────────────────
  baseline:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    working_dir: /app
    command: >
      torchrun --nproc_per_node=4
        -m weighted_mtp.pipelines.run_baseline
        --config configs/production/baseline.yaml

  # ── Phase 1.5: LoRA Merge (Baseline SFT → Critic base model) ───
  merge:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    command: >
      python scripts/merge_sft_for_value.py
        --checkpoint storage/checkpoints/ntp_baseline/checkpoint_final.pt
        --output storage/models/llama3-8b-code-merged

  # ── Phase 2: Critic Training (Pairwise value learning) ──────────
  critic:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    command: >
      torchrun --nproc_per_node=4
        -m weighted_mtp.pipelines.run_critic
        --config configs/production/critic_mlp.yaml

  # ── Phase 3: TAW (Token Advantage Weighting) ────────────────────
  taw:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    command: >
      torchrun --nproc_per_node=4
        -m weighted_mtp.pipelines.run_baseline
        --config configs/production/taw.yaml

  # ── Phase 3: Random-Matched (ablation control) ──────────────────
  random-matched:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    command: >
      torchrun --nproc_per_node=4
        -m weighted_mtp.pipelines.run_baseline
        --config configs/production/random_matched.yaml

  # ── Phase 3: Shuffled (ablation control) ────────────────────────
  shuffled:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    command: >
      torchrun --nproc_per_node=4
        -m weighted_mtp.pipelines.run_baseline
        --config configs/production/shuffled.yaml

  # ── Phase 4: Evaluation (single GPU, EvalPlus) ──────────────────
  evaluate:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    command: >
      python -m weighted_mtp evaluate
        --checkpoint storage/checkpoints/ntp_baseline/checkpoint_final.pt
        --dataset humaneval
        --eval-mode evalplus
        --num-samples 1

  # ── Utility: Data preprocessing ─────────────────────────────────
  preprocess:
    build: .
    image: weighted-mtp:latest
    volumes:
      - ./storage:/storage
    command: >
      python scripts/create_storage/setup_codecontests_plus.py

  preprocess-gonogo:
    build: .
    image: weighted-mtp:latest
    volumes:
      - ./storage:/storage
    command: >
      python scripts/create_storage/setup_codecontests_plus.py
        --max-problems 500 --max-solutions-per-problem 100

  # ── Utility: Interactive shell ──────────────────────────────────
  shell:
    build: .
    image: weighted-mtp:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./storage:/storage
    shm_size: '16gb'
    stdin_open: true
    tty: true
    command: /bin/bash
