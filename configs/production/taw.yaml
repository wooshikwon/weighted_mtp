# NTP TAW (Token Advantage Weighting)
# LLaMA-3 8B LoRA with Critic-based token weighting
# Production config (VESSL H200 4-GPU)

experiment:
  name: ntp_taw
  stage: baseline
  description: "NTP TAW (Token Advantage Weighting) - LLaMA-3 8B LoRA with Critic"
  tags: [ntp, taw, llama3-8b, critic]

# Models
models:
  policy:
    path: meta-llama/Meta-Llama-3-8B
    dtype: bfloat16
  value_model:
    checkpoint_path: storage/checkpoints/critic_llama3/checkpoint_final.pt

# Dataset
dataset:
  name: codecontests
  train: storage/datasets/codecontests/processed/train.jsonl
  validation: storage/datasets/codecontests/processed/validation.jsonl
  max_length: 2048

# Data sampling
data_sampling:
  seed: 42
  n_samples: 200000
  val_n_samples: 5000
  use_pairwise: false
  difficulty_bins:
    all: [0, 25]
  difficulty_weights:
    all: 1.0

# Training
training:
  weight_mode: critic
  td_lambda: 0.95
  beta: 1.0
  weight_clip_min: 0.1
  weight_clip_max: 3.0
  td_ema_momentum: 0.1
  td_ema_warmup_steps: 10
  n_epochs: 1.0
  batch_size: 12
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  max_grad_norm: 1.0
  log_interval: 10
  use_lora: true
  lora:
    rank: 64
    alpha: 128.0
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

# Distributed
distributed:
  fsdp:
    sharding_strategy: FULL_SHARD
    mixed_precision: true
    cpu_offload: false
    activation_checkpointing: true

# Checkpoint
checkpoint:
  save_dir: storage/checkpoints/ntp_taw
  save_checkpoint_every: 0.5
  save_final: true

# Runtime
runtime:
  seed: 42

# Logging
logging:
  level: INFO

# MLflow
mlflow:
  tracking_uri: storage/mlruns
  experiment: weighted-mtp-ntp
